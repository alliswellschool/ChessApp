
  <!-- Activities Section -->
  <section class="activities">
    <div class="activities-grid">
      <a 
        *ngFor="let activity of activityCards; trackBy: trackByActivityId"
        [routerLink]="activity.route" 
        class="activity-card-wrapper"
        [class.flip-enabled]="isLoggedIn && !isLoading"
        [class.progress-loading]="isLoggedIn && isLoading">

        <div class="activity-card-inner">
          <div class="activity-card activity-card-front">
            <div class="activity-icon" [class.completed]="activity.isComplete">{{ activity.icon }}</div>
            <h3 class="activity-title">{{ activity.title }}</h3>
            <p class="activity-description">{{ activity.description }}</p>
            <span class="activity-link">Start →</span>
            <div *ngIf="isLoggedIn && !isLoading" class="flip-hint">Hover to see stats</div>
          </div>

          <div *ngIf="isLoggedIn" class="activity-card activity-card-back">
            <div *ngIf="isLoading" class="stats-loading">Loading progress...</div>

            <ng-container *ngIf="!isLoading">
              <div class="stats-content">
                <div class="stat-item">
                  <div class="stat-number">{{ activity.completed }}</div>
                  <div class="stat-label">Completed</div>
                </div>
                <div class="stat-divider">/</div>
                <div class="stat-item">
                  <div class="stat-number">{{ isFinitePuzzle(activity.total) ? activity.total : '∞' }}</div>
                  <div class="stat-label">Total</div>
                </div>
              </div>

              <div class="progress-container" *ngIf="isFinitePuzzle(activity.total)">
                <div class="progress-bar-outer">
                  <div
                    class="progress-bar-inner"
                    [style.width.%]="activity.percentage">
                  </div>
                </div>
                <div class="progress-text">{{ activity.percentage }}% Complete</div>
              </div>

              <div class="progress-container" *ngIf="!isFinitePuzzle(activity.total)">
                <div class="progress-text">Practice mode</div>
              </div>

              <div class="click-hint">Click to start →</div>
            </ng-container>
          </div>
        </div>
      </a>
    </div>
  </section>
